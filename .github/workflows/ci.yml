name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    name: Detect Changed Surfaces
    runs-on: ubuntu-latest
    outputs:
      run_windows_package: ${{ steps.filter.outputs.run_windows_package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine packaging impact
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "run_windows_package=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(packaging/|src/|tests/|scripts/bootstrap-iscc\.ps1|scripts/build-windows-release\.ps1|scripts/smoke-test-windows-release\.py|pyproject\.toml)'; then
            echo "run_windows_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_windows_package=false" >> "$GITHUB_OUTPUT"
          fi

  python:
    name: Python Checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run mypy
        run: python -m mypy src tests

      - name: Run headless QA client
        run: python -m market_data_recorder_desktop.qa_client --headless --workspace .tmp\qa-ci --output .tmp\qa-ci\report.json

      - name: Upload QA report
        uses: actions/upload-artifact@v4
        with:
          name: superior-qa-report
          path: |
            .tmp/qa-ci/report.json
            .tmp/qa-ci/**

  windows-package:
    name: Windows Package Smoke
    needs: changes
    if: needs.changes.outputs.run_windows_package == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,packaging]"

      - name: Build and smoke-test Windows release
        shell: pwsh
        run: .\scripts\build-windows-release.ps1

      - name: Upload Windows package logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: superior-windows-package-logs
          path: |
            .tmp/build-windows-release.log
            .tmp/release-stage/**

  site:
    name: Site Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:browser
