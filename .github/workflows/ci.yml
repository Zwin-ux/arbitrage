name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python Checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Run mypy
        run: python -m mypy src tests

  windows-package:
    name: Windows Package Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,packaging]"

      - name: Build and smoke-test Windows release
        shell: pwsh
        run: .\scripts\build-windows-release.ps1

  site:
    name: Site Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:browser
