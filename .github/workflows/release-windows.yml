name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Superior Windows Release
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-v1/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm ci

      - name: Run desktop validation
        run: |
          npm run check
          npm run test
          npm run build

      - name: Build Windows release assets
        run: npm run tauri:build

      - name: Prepare public release bundle
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $repoRoot = Split-Path -Parent $PWD
          $dist = Join-Path $repoRoot 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $releaseRoot = Join-Path $PWD 'src-tauri\\target\\release'
          $bundleRoot = Join-Path $releaseRoot 'bundle'
          $installer = Get-ChildItem -Path (Join-Path $bundleRoot 'nsis') -Filter '*.exe' | Select-Object -First 1
          $msi = Get-ChildItem -Path (Join-Path $bundleRoot 'msi') -Filter '*.msi' | Select-Object -First 1
          $portableZip = Join-Path $dist ("Superior_{0}_x64-portable.zip" -f $version)

          Compress-Archive -Path (Join-Path $releaseRoot 'superior.exe') -DestinationPath $portableZip -Force
          Copy-Item $installer.FullName -Destination (Join-Path $dist $installer.Name) -Force
          Copy-Item $msi.FullName -Destination (Join-Path $dist $msi.Name) -Force

          $assets = @(
            Join-Path $dist $installer.Name
            Join-Path $dist $msi.Name
            $portableZip
          )

          $hashLines = foreach ($asset in $assets) {
            $hash = Get-FileHash -Path $asset -Algorithm SHA256
            "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), (Split-Path $asset -Leaf)
          }
          Set-Content -Path (Join-Path $dist 'SHA256SUMS.txt') -Value $hashLines -Encoding ascii

      - name: Sign Windows artifacts
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        shell: pwsh
        run: |
          $repoRoot = Split-Path -Parent $PWD
          $dist = Join-Path $repoRoot 'dist'
          $pfxPath = Join-Path $env:RUNNER_TEMP 'superior-codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}'))
          $signtool = (Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $signtool) { throw 'signtool.exe not found on runner' }

          Get-ChildItem -Path $dist -Include *.exe,*.msi -File | ForEach-Object {
            & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfxPath /p '${{ secrets.WINDOWS_CODESIGN_PASSWORD }}' $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $($_.FullName)" }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: superior-windows
          path: |
            dist/Superior_*-setup.exe
            dist/Superior_*-portable.zip
            dist/Superior_*_en-US.msi
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Superior_*-setup.exe
            dist/Superior_*-portable.zip
            dist/Superior_*_en-US.msi
            dist/SHA256SUMS.txt
          generate_release_notes: true
